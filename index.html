<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A* Pathfinding Visualizer Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.78);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --border: rgba(148, 163, 184, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 30%),
        linear-gradient(160deg, #020617 0%, #0f172a 55%, #111827 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    video {
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #000;
      display: block;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    .links {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      color: #f8fafc;
      text-decoration: none;
      background: rgba(34, 197, 94, 0.18);
      border: 1px solid rgba(34, 197, 94, 0.35);
      padding: 10px 14px;
      border-radius: 999px;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    a:hover {
      background: rgba(34, 197, 94, 0.28);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>A* Pathfinding Visualizer</h1>
    <p>
      Demo video for the pathfinding visualizer. This page is designed for GitHub Pages so
      visitors can watch the walkthrough directly in the browser.
    </p>
    <video controls preload="metadata">
      <source src="assets/pathfinding-visualizer-demo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="links">
      <a href="https://github.com/j-o-s-e-p-h-h/A-star-Pathfinding-Visualizer">View Repository</a>
      <a href="assets/pathfinding-visualizer-demo.mp4">Open Raw Video</a>
    </div>
  </main>
</body>
</html>
